deck: ML
cards:
  - id: llm-repr-01
    type: basic
    front: "Name the three number representations in a classifier/LM head and the ops that connect them."
    back: >
      Logits (any reals, pre-softmax scores) → softmax → probs (0..1, sum
      to 1) → log → log-probs (≤ 0). Shortcut: log_softmax goes logits →
      log-probs in one fused step. exp takes log-probs back to probs;
      logits are not recoverable (softmax is shift-invariant).
    tags: [llm, ml]

  - id: llm-repr-02
    type: basic
    front: "Is log_softmax(x) the same as log(softmax(x))? Why does the fused version exist?"
    back: >
      Mathematically identical. The fused version never materializes tiny
      probabilities: softmax can round to 0.0 in float32 and log(0) = -inf.
      log_softmax(x) = x − logsumexp(x), stable for any logit spread. Rule:
      on the way to a loss, never leave log-space.
    tags: [llm, ml]

  - id: llm-repr-03
    type: basic
    front: "Where does the minus sign in −log p live, and why?"
    back: >
      Only at the loss. log p of a probability is ≤ 0; maximizing log-
      likelihood ≡ minimizing −log p, and DL tooling minimizes. Log-probs
      themselves stay negative (healthy); a loss is ≥ 0. A positive
      "log-prob" or negative NLL means a sign got lost.
    tags: [llm, ml]

  - id: llm-repr-04
    type: basic
    front: "Why compute sequence likelihood in log-space at all? (3 reasons)"
    back: >
      1) Products become sums: P(seq) = Πpᵢ underflows to 0.0 for long
      sequences; Σ log pᵢ doesn't. 2) Stability of intermediates (see
      log_softmax). 3) Surprise is additive: −log p is the information-
      theoretic surprise, in nats (ln) or bits (log₂).
    tags: [llm, ml]

  - id: llm-sample-01
    type: basic
    front: "jax.random.categorical(key, x) — what does it expect x to be, and what silently goes wrong if you pass probabilities?"
    back: >
      Log-probabilities / logits. Passing probs makes it softmax them
      AGAIN: [0, 1] becomes ~[0.27, 0.73] — probability-zero events get
      sampled ~26% of the time, and small tests can still pass by luck.
      Fix: jnp.log(probs); log(0) = −inf correctly means "never sample".
    tags: [llm, jax]

  - id: llm-softmax-vs-div-01
    type: basic
    front: "Turning numbers into a probability distribution: when softmax, when plain division?"
    back: >
      Softmax converts SCORES (logits — any reals, log-ish scale).
      Row-division converts COUNTS/MASSES (already nonnegative and
      proportional): counts / counts.sum(axis, keepdims=True). Softmaxing
      counts exponentiates and distorts them; dividing counts is the
      maximum-likelihood estimate.
    tags: [llm, ml]

  - id: llm-nll-01
    type: basic
    front: "Cross-entropy loss vs negative log-likelihood — what's the difference?"
    back: >
      Same number, two names: mean −log P(true next token). "NLL" is the
      statistics name (likelihood view), "cross-entropy" the information-
      theory name. Works for any probabilistic model — counted bigram
      tables and trained transformers are scored identically.
    tags: [llm, ml]

  - id: llm-nll-02
    type: basic
    front: "Char-level LM loss ruler: what do ~log V, a bigram's NLL, and anything below it mean?"
    back: >
      log V ≈ uniform guessing (knows nothing). Counted bigram NLL ≈ the
      FLOOR for 1-char context (counting is the ML estimate — no same-
      context model beats it). Dropping below the bigram line structurally
      requires longer context — that's the moment attention earns its keep.
    tags: [llm, ml]

  - id: llm-nll-03
    type: basic
    front: "Perplexity — definition and intuition?"
    back: >
      perplexity = e^NLL (NLL in nats). "As confused as choosing uniformly
      among k options": uniform over V has perplexity exactly V; NLL 2.4 →
      ≈ 11 effective choices per character. Lower is better; 1 is a
      perfect model.
    tags: [llm, ml]

  - id: llm-allpairs-01
    type: basic
    front: "scores[i, j] = q[i] · k[j] for ALL pairs of rows — what single op computes this, and why does it work?"
    back: >
      q @ k.T. Matmul definition: (A@B)[i,j] = row i of A · column j of B,
      and column j of k.T IS row j of k. Shapes: (T,dk) @ (dk,T) → (T,T) —
      the feature dim dk is consumed by the dots, both T's survive as the
      two free indices. (q * k is the classic wrong answer: elementwise,
      only pairs matching indices i with i.)
    tags: [llm, ml, matmul]

  - id: llm-allpairs-02
    type: basic
    front: "How do you RECOGNIZE an X @ Y.T (all-pairs) situation from a formula?"
    back: >
      Count free indices: out[i, j] with i over rows of X, j over rows of Y
      (two free indices → a table), and the feature axis summed away by a
      dot product (appears in both inputs, absent from output → consumed).
      Same counting as "one vmap per output dim". One shared index instead
      (out[i] = f(x[i], y[i])) → elementwise, not matmul.
    tags: [llm, ml, matmul]

  - id: llm-allpairs-03
    type: basic
    front: "Name three places the 'X @ Y.T = all-pairs row similarity' pattern shows up."
    back: >
      1) Attention scores: q @ k.T — every query against every key.
      2) Cosine-similarity matrices (normalize rows first).
      3) Nearest-neighbor / retrieval scoring: queries @ database.T.
      With Y = X it's self-similarity (attention within one sequence).
    tags: [llm, ml, matmul]

  - id: llm-attn-01
    type: basic
    front: "Scaled dot-product attention: what are the four stages and what does each mean?"
    back: >
      1) scores = q @ k.T / sqrt(dk) — raw compatibility, every asker ×
      every answerer. 2) causal mask — future scores to −inf (arrow of
      time as a triangular matrix). 3) softmax per row — each position
      gets a probability distribution over the past. 4) weights @ v —
      weighted average of value vectors. One-liner: softmax(qkᵀ/√d)·v.
    tags: [llm, ml]

  - id: llm-attn-02
    type: basic
    front: "Why divide attention scores by sqrt(dk)?"
    back: >
      Dot products of dk-dim vectors grow like sqrt(dk) (variance-of-sums,
      the He-init argument). Large scores saturate softmax into near
      one-hot weights with vanishing gradients. Dividing keeps scores O(1)
      at any head width.
    tags: [llm, ml]

  - id: llm-attn-03
    type: basic
    front: "Attention q, k, v — what role does each vector play, and why three separate projections of x?"
    back: >
      query = what I'm looking for; key = what I advertise; value = what I
      hand over if selected. Three learned matrices (x@Wq, x@Wk, x@Wv) let
      a position seek things unlike itself — matching x against x directly
      would conflate seeking, advertising, and delivering.
    tags: [llm, ml]

  - id: llm-attn-rowcol-01
    type: basic
    front: "In the (T, T) attention score/weight table, what do the row index and column index each mean?"
    back: >
      Row i = the position ASKING (query owner); column j = the position
      being ASKED about (key owner). weights[i, j] = how much position i
      attends to position j. Reading habits: a ROW is one position's view
      of everyone; a COLUMN is everyone's interest in one position.
    tags: [llm, ml, rowcol]

  - id: llm-attn-rowcol-02
    type: basic
    front: "Re-derive in two sentences: is the causal attention mask lower- or upper-triangular?"
    back: >
      Row = asker; an asker may see its past, columns j ≤ i — that region
      (diagonal included: you may see yourself) is the LOWER triangle. The
      blocked future is the upper triangle — so a keep-mask (True=allowed)
      is tril, while an additive −inf kill-mask marks the complement: triu
      with k=1. Same wall, two polarities; derive, don't memorize.
    tags: [llm, ml, rowcol]

  - id: llm-attn-rowcol-03
    type: basic
    front: "Attention weights: softmax along which axis of the (T, T) table, and why is the other axis wrong?"
    back: >
      Along rows (axis=-1): each asker's weights over the past must form
      one probability distribution, so each ROW sums to 1. Column-wise
      softmax would instead normalize "everyone's interest in position j"
      — a popularity contest, not a mixing recipe; weights @ v would no
      longer be a weighted average per position.
    tags: [llm, ml, rowcol]

  - id: llm-attn-rowcol-04
    type: basic
    front: "General row/column tiebreaker when a 2-D table confuses you — what's the drill?"
    back: >
      Ask "what does ONE ROW mean?" — the first index picks a row, m[i] is
      row i, axis 0 runs down rows. In ML tables the row is almost always
      the per-example unit: one sample of a data matrix (n, d), one asker
      of an attention table, one current-char of a bigram table. Name the
      row's meaning first and the column's follows.
    tags: [llm, ml, rowcol]
